<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>بلدية باجة - منظومة المشاريع</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><style>body{background-color:#f4f7f6;padding:15px}.card{border-radius:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1);margin-bottom:20px}.card-header{background-color:#004a99;color:white;font-weight:bold;border-radius:15px 15px 0 0 !important}</style></head><body><div class="container"><div class="text-center mb-4"><h2 style="color:#004a99">بلدية باجة</h2></div><div class="card"><div class="card-header">➕ إضافة مشروع جديد</div><div class="card-body"><div class="row g-2"><div class="col-md-4"><input type="text" id="n" class="form-control" placeholder="اسم المشروع"></div><div class="col-md-3"><input type="text" id="b" class="form-control" placeholder="الميزانية"></div><div class="col-md-3"><input type="text" id="c" class="form-control" placeholder="المقاول"></div><div class="col-md-2"><button onclick="save()" id="btn" class="btn btn-primary w-100">إضافة</button></div></div></div></div><div class="card"><div class="card-header">📊 سجل المشاريع</div><div class="table-responsive"><table class="table text-center mb-0"><thead><tr><th>المشروع</th><th>الميزانية</th><th>المقاول</th></tr></thead><tbody id="list"><tr><td colspan="3">جاري الاتصال بالسحابة...</td></tr></tbody></table></div></div></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";import{getDatabase,ref,onValue,push}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
const config={databaseURL:"https://suivi-projets-4817b-default-rtdb.europe-west1.firebasedatabase.app/"};
const app=initializeApp(config);const db=getDatabase(app);const r=ref(db,'projects');
onValue(r,(s)=>{const d=s.val();const l=document.getElementById('list');l.innerHTML='';if(d){Object.keys(d).forEach(k=>{const p=d[k];l.insertAdjacentHTML('afterbegin',`<tr><td>${p.name||'--'}</td><td class="text-success fw-bold">${p.budget||'--'}</td><td>${p.contractor||'--'}</td></tr>`)})}else{l.innerHTML='<tr><td colspan="3">لا توجد مشاريع حالياً</td></tr>'}},(e)=>{alert("عذراً، المتصفح يرفض الاتصال: "+e.message)});
window.save=function(){const name=document.getElementById('n').value;const bud=document.getElementById('b').value;const con=document.getElementById('c').value;if(name){const b=document.getElementById('btn');b.innerText="جاري الحفظ...";push(r,{name:name,budget:bud,contractor:con}).then(()=>{alert("✅ تم الحفظ بنجاح!");document.getElementById('n').value='';document.getElementById('b').value='';document.getElementById('c').value='';}).catch(e=>alert("❌ خطأ في الحماية: "+e.message)).finally(()=>b.innerText="إضافة");}else{alert("اكتبي اسم المشروع")}};</script></body></html
