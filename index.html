<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>منظومة بلدية باجة الاحترافية</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    :root { --admin-blue: #003366; --table-border: #bcbcbc; }
    body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma; font-size: 13px; }
    .official-page { background: white; max-width: 1100px; margin: 20px auto; padding: 40px; border: 1px solid #ddd; position: relative; }
   
    /* تنسيق نموذج الإدخال السطري المطابق لصورتك */
    .entry-bar { border: 2px dashed var(--admin-blue); padding: 15px; border-radius: 8px; background: #fdfdfd; margin-bottom: 30px; }
    .entry-bar label { display: block; font-size: 11px; color: #555; margin-bottom: 5px; text-align: center; }
    .entry-bar input { border: none; border-bottom: 1px solid #ccc; text-align: center; border-radius: 0; padding: 5px; }
    .entry-bar input:focus { box-shadow: none; border-bottom-color: var(--admin-blue); }

    /* تنسيق الجداول الرسمية */
    .section-head { background: #eee; font-weight: bold; padding: 5px 15px; border-right: 4px solid var(--admin-blue); margin: 20px 0 10px; }
    .table-official { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    .table-official th, .table-official td { border: 1px solid var(--table-border); padding: 10px; text-align: center; }
    .table-official th { background: #f8f9fa; font-size: 12px; }

    @media print {
        .no-print { display: none !important; }
        .official-page { border: none; padding: 0; width: 100%; max-width: 100%; }
        body { background: white; }
    }
</style></head><body>

<div class="official-page">
    <div class="d-flex justify-content-between align-items-start border-bottom pb-3 mb-4">
        <div class="text-center"><h6>الجمهورية التونسية</h6><h6>وزارة الشؤون المحلية والبيئة</h6><h5>بلدية باجة - المصلحة الفنية</h5></div>
        <div class="no-print"><button onclick="window.print()" class="btn btn-outline-dark btn-sm">🖨️ طباعة التقرير</button></div>
    </div>

    <div class="entry-bar no-print">
        <div class="row g-2 align-items-end">
            <div class="col-md-3"><label>اسم المشروع</label><input type="text" id="n" class="form-control"></div>
            <div class="col-md-2"><label>الميزانية (أ.د)</label><input type="number" id="tot" class="form-control"></div>
            <div class="col-md-2"><label>مدة الإنجاز</label><input type="number" id="dur" class="form-control"></div>
            <div class="col-md-3"><label>ملاحظات / أسباب التوقف</label><input type="text" id="note" class="form-control"></div>
            <div class="col-md-2 d-flex gap-1">
                <button onclick="logData('عمل')" class="btn btn-success w-100 fw-bold">✔ عمل</button>
                <button onclick="logData('توقف')" class="btn btn-danger w-100 fw-bold">✖ توقف</button>
            </div>
        </div>
    </div>

    <div id="output-area">
        </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({ databaseURL: "https://suivi-projets-4817b-default-rtdb.firebaseio.com/" });
const db = getDatabase(app); const r = ref(db, 'final_reports_v6');

onValue(r, (snap) => {
    const data = snap.val(); const out = document.getElementById('output-area'); out.innerHTML = '';
    if (data) {
        Object.keys(data).forEach(k => {
            const p = data[k];
            const netWork = p.dur - (p.stops || 0);
            out.insertAdjacentHTML('beforeend', `
                <div class="project-wrap mb-5">
                    <div class="section-head">أولاً: المعطيات الفنية والمالية</div>
                    <table class="table-official">
                        <tr><th width="20%">المشروع</th><td colspan="3"><b>${p.name}</b></td></tr>
                        <tr><th>الميزانية</th><td>${p.tot} أ.د</td><th width="20%">المقاولة</th><td>${p.c || 'غير محدد'}</td></tr>
                    </table>

                    <div class="section-head">ثالثاً: الجدول الزمني والحركات</div>
                    <table class="table-official">
                        <tr><th>مدة الإنجاز</th><td>${p.dur} يوم</td><th>أيام التوقف</th><td class="text-danger fw-bold">${p.stops || 0} يوم</td></tr>
                        <tr><th>الرصيد المتبقي</th><td>${netWork} يوم</td><th>التاريخ</th><td>${p.date}</td></tr>
                    </table>

                    <div class="section-head">رابعاً: سجل الحركات اليومية</div>
                    <table class="table-official">
                        <thead class="table-light"><tr><th>الحالة</th><th>الأسباب والملاحظات</th><th class="no-print">تحكم</th></tr></thead>
                        <tbody>
                            <tr>
                                <td><span class="badge ${p.type==='عمل'?'bg-success':'bg-danger'}">${p.type}</span></td>
                                <td>${p.note || '---'}</td>
                                <td class="no-print"><button onclick="del('${k}')" class="btn btn-sm btn-link text-danger">حذف</button></td>
                            </tr>
                        </tbody>
                    </table>
                    <hr style="border-top: 2px solid #333">
                </div>
            `);
        });
    } else { out.innerHTML = '<p class="text-center text-muted">لا توجد مشاريع مسجلة حالياً</p>'; }
});

window.logData = function(type) {
    const name = document.getElementById('n').value;
    if(!name) return alert("الرجاء إدخال اسم المشروع");
   
    push(r, {
        name: name,
        tot: document.getElementById('tot').value,
        dur: Number(document.getElementById('dur').value),
        note: document.getElementById('note').value,
        type: type,
        stops: type === 'توقف' ? 1 : 0,
        date: new Date().toLocaleDateString('ar-TN')
    }).then(() => {
        alert("تم التسجيل بنجاح");
        document.getElementById('note').value = '';
    });
};

window.del = function(k) { if(confirm("حذف السجل؟")) remove(ref(db, 'final_reports_v6/' + k)); };
</script></body></html>
