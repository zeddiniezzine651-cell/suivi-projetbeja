<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>منظومة مشاريع بلدية باجة</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><style>body{background-color:#f0f2f5;font-family:'Segoe UI',Tahoma,sans-serif;padding:20px} .card{border:none;border-radius:15px;box-shadow:0 8px 20px rgba(0,0,0,0.08);margin-bottom:25px} .card-header{background:#004a99;color:white;font-weight:bold;border-radius:15px 15px 0 0 !important;padding:15px} .btn-print{background:#444;color:white} @media print{ .no-print{display:none} .card{box-shadow:none;border:1px solid #ddd} body{background:white;padding:0} }</style></head><body><div class="container"><div class="text-center mb-4 no-print"><h2 style="color:#004a99">بلدية باجة<br><small class="text-muted fs-6">المصلحة الفنية للمشاريع</small></h2></div><div class="card no-print"><div class="card-header">➕ إضافة مشروع جديد للمنظومة</div><div class="card-body"><div class="row g-3"><div class="col-md-3"><input type="text" id="n" class="form-control" placeholder="اسم المشروع"></div><div class="col-md-2"><input type="text" id="b" class="form-control" placeholder="الميزانية (د.ت)"></div><div class="col-md-3"><input type="text" id="c" class="form-control" placeholder="المقاول"></div><div class="col-md-2"><select id="s" class="form-control"><option value="قيد الإنجاز">قيد الإنجاز</option><option value="مكتمل">مكتمل</option><option value="متوقف">متوقف</option></select></div><div class="col-md-2"><button onclick="save()" id="btn" class="btn btn-primary w-100">حفظ المشروع</button></div></div></div></div><div class="card"><div class="card-header d-flex justify-content-between align-items-center"><span>📊 سجل المشاريع العمومية</span><button onclick="window.print()" class="btn btn-sm btn-print no-print">🖨️ طباعة التقرير</button></div><div class="table-responsive"><table class="table table-hover text-center mb-0"><thead><tr class="table-light"><th>المشروع</th><th>الميزانية</th><th>المقاول</th><th>الوضعية</th><th class="no-print">إجراءات</th></tr></thead><tbody id="list"><tr><td colspan="5">جاري جلب البيانات...</td></tr></tbody></table></div></div></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";import{getDatabase,ref,onValue,push,remove}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
const config={databaseURL:"https://suivi-projets-4817b-default-rtdb.firebaseio.com/"};
const app=initializeApp(config);const db=getDatabase(app);const r=ref(db,'projects');
onValue(r,(s)=>{const d=s.val();const l=document.getElementById('list');l.innerHTML='';if(d){Object.keys(d).forEach(k=>{const p=d[k];l.insertAdjacentHTML('afterbegin',`<tr><td class="fw-bold">${p.name}</td><td class="text-primary">${p.budget} د.ت</td><td>${p.contractor}</td><td><span class="badge ${p.status==='مكتمل'?'bg-success':'bg-warning text-dark'}">${p.status}</span></td><td class="no-print"><button onclick="del('${k}')" class="btn btn-sm btn-outline-danger">حذف</button></td></tr>`)})}else{l.innerHTML='<tr><td colspan="5">القائمة فارغة</td></tr>'}},(e)=>alert("خطأ: "+e.message));
window.save=function(){const n=document.getElementById('n').value;if(n){const b=document.getElementById('btn');b.disabled=true;push(r,{name:n,budget:document.getElementById('b').value,contractor:document.getElementById('c').value,status:document.getElementById('s').value}).then(()=>{document.getElementById('n').value='';document.getElementById('b').value='';document.getElementById('c').value='';}).finally(()=>b.disabled=false);}else{alert("أدخل اسم المشروع")}};
window.del=function(k){if(confirm("هل أنت متأكد من حذف هذا المشروع؟")){remove(ref(db,'projects/'+k));}};</script></body></html>
