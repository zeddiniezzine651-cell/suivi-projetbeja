<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام متابعة مشاريع بلدية باجة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; font-size: 13px; }
        .container { max-width: 1300px; margin-top: 20px; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-section { border-bottom: 3px solid #0056b3; margin-bottom: 20px; padding-bottom: 10px; }
        th { background-color: #e9ecef !important; text-align: center; border: 1px solid #000 !important; }
        td { border: 1px solid #000 !important; vertical-align: middle; }
        .form-label { font-weight: bold; margin-bottom: 2px; font-size: 12px; }
        .btn-save { background-color: #0056b3; color: white; font-weight: bold; }
        @media print { .no-print { display: none !important; } .container { width: 100% !important; max-width: none !important; box-shadow: none !important; margin: 0; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section d-flex justify-content-between align-items-center">
        <div class="text-center"><h6>الجمهورية التونسية</h6><h6>بلدية باجة - المصلحة الفنية</h6></div>
        <h4 class="text-primary">متابعة حضائر الأشغال الجارية</h4>
        <button onclick="window.print()" class="btn btn-outline-dark no-print">🖨️ طباعة التقرير</button>
    </div>

    <div class="row g-2 no-print border p-3 rounded bg-light mb-4">
        <div class="col-md-3"><label class="form-label">اسم المشروع</label><input type="text" id="n" class="form-control form-control-sm"></div>
        <div class="col-md-2"><label class="form-label">المقاول</label><input type="text" id="c" class="form-control form-control-sm"></div>
        <div class="col-md-2"><label class="form-label">مكتب الدراسات</label><input type="text" id="office" class="form-control form-control-sm"></div>
        <div class="col-md-1"><label class="form-label">المدة</label><input type="number" id="dur" class="form-control form-control-sm"></div>
        <div class="col-md-2"><label class="form-label">التكلفة (أ.د)</label><input type="number" id="tot" class="form-control form-control-sm"></div>
        <div class="col-md-2"><label class="form-label">المدفوع (أ.د)</label><input type="number" id="paid" class="form-control form-control-sm"></div>
       
        <div class="col-md-2"><label class="form-label">التقدم المادي (%)</label><input type="number" id="prog_m" class="form-control form-control-sm"></div>
        <div class="col-md-2"><label class="form-label text-primary">بصدد الأشغال</label><input type="text" id="z_o" class="form-control form-control-sm"></div>
        <div class="col-md-2"><label class="form-label text-danger">لم تبدأ</label><input type="text" id="z_p" class="form-control form-control-sm"></div>
        <div class="col-md-2"><label class="form-label text-success">انتهت</label><input type="text" id="z_d" class="form-control form-control-sm"></div>
       
        <div class="col-md-1"><label class="form-label">جوية (أيام)</label><input type="number" id="p_wea" class="form-control form-control-sm" value="0"></div>
        <div class="col-md-1"><label class="form-label">مقاول (أيام)</label><input type="number" id="p_con" class="form-control form-control-sm" value="0"></div>
        <div class="col-md-2 d-flex align-items-end"><button onclick="saveData()" class="btn btn-save w-100 btn-sm">💾 حفظ البيانات</button></div>
    </div>

    <div class="table-responsive">
        <table class="table table-sm">
            <thead>
                <tr>
                    <th rowspan="2">المشروع / المقاول / المكتب</th>
                    <th rowspan="2">البيانات المالية (أ.د)</th>
                    <th rowspan="2">التقدم المالي</th>
                    <th rowspan="2">التقدم المادي</th>
                    <th colspan="3">مناطق التدخل</th>
                    <th colspan="2">أيام التوقف</th>
                    <th rowspan="2" class="no-print">إجراء</th>
                </tr>
                <tr>
                    <th>بصدد الإنجاز</th>
                    <th>لم تبدأ بعد</th>
                    <th>منتهية</th>
                    <th>جوية</th>
                    <th>مقاول</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://suivi-projets-4817b-default-rtdb.firebaseio.com/" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const r = ref(db, 'projects_v4');

    // العرض
    onValue(r, (s) => {
        const data = s.val();
        const b = document.getElementById('tableBody');
        b.innerHTML = '';
        if (data) {
            Object.keys(data).forEach(k => {
                const p = data[k];
                const financial_p = ((p.paid / p.tot) * 100).toFixed(1);
                b.insertAdjacentHTML('beforeend', `
                    <tr>
                        <td class="text-end"><b>${p.name}</b><br><small>المقاول: ${p.c}</small><br><small>المكتب: ${p.office || '---'}</small></td>
                        <td><small>كلفة: ${p.tot}<br>دفع: ${p.paid}</small></td>
                        <td class="fw-bold">${financial_p}%</td>
                        <td class="fw-bold text-primary text-center">${p.prog_m}%</td>
                        <td>${p.z_o || '---'}</td>
                        <td class="text-danger">${p.z_p || '---'}</td>
                        <td class="text-success">${p.z_d || '---'}</td>
                        <td class="text-center">${p.p_wea || 0}</td>
                        <td class="text-center">${p.p_con || 0}</td>
                        <td class="no-print text-center"><button onclick="del('${k}')" class="btn btn-sm btn-danger">حذف</button></td>
                    </tr>
                `);
            });
        }
    });

    // الحفظ
    window.saveData = function() {
        const pData = {
            name: document.getElementById('n').value,
            c: document.getElementById('c').value,
            office: document.getElementById('office').value,
            dur: document.getElementById('dur').value,
            tot: parseFloat(document.getElementById('tot').value) || 0,
            paid: parseFloat(document.getElementById('paid').value) || 0,
            prog_m: document.getElementById('prog_m').value,
            z_o: document.getElementById('z_o').value,
            z_p: document.getElementById('z_p').value,
            z_d: document.getElementById('z_d').value,
            p_wea: document.getElementById('p_wea').value,
            p_con: document.getElementById('p_con').value
        };
        if(!pData.name) return alert("أدخل اسم المشروع");
        push(r, pData).then(() => { alert("تم الحفظ بنجاح"); location.reload(); });
    };

    // الحذف
    window.del = function(k) {
        if(confirm("حذف المشروع؟")) remove(ref(db, 'projects_v4/' + k));
    };
</script>
</body>
</html>
