<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>بلدية باجة</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><style>body{background-color:#f8f9fa;padding:15px}.card{border-radius:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1);margin-bottom:20px}.card-header{background-color:#004a99;color:white;font-weight:bold;border-radius:15px 15px 0 0 !important}</style></head><body><div class="container text-center"><h2 style="color:#004a99" class="mb-4">بلدية باجة</h2><div class="card"><div class="card-header">إضافة مشروع</div><div class="card-body"><input type="text" id="n" class="form-control mb-2" placeholder="اسم المشروع"><input type="text" id="b" class="form-control mb-2" placeholder="الميزانية"><button onclick="save()" id="btn" class="btn btn-primary w-100">حفظ الآن</button></div></div><div class="card"><div class="card-header">المشاريع المسجلة</div><div class="table-responsive"><table class="table mb-0"><thead><tr><th>المشروع</th><th>الميزانية</th></tr></thead><tbody id="list"><tr><td colspan="2">انتظار الرد من Firebase...</td></tr></tbody></table></div></div></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";import{getDatabase,ref,onValue,push}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
// جربي هذا الرابط الذي ينتهي بـ .com مباشرة
const config={databaseURL:"https://suivi-projets-4817b-default-rtdb.firebaseio.com/"};
const app=initializeApp(config);const db=getDatabase(app);const r=ref(db,'projects');
onValue(r,(s)=>{const d=s.val();const l=document.getElementById('list');l.innerHTML='';if(d){Object.keys(d).forEach(k=>{const p=d[k];l.insertAdjacentHTML('afterbegin',`<tr><td>${p.name||'--'}</td><td class="text-success fw-bold">${p.budget||'--'}</td></tr>`)})}else{l.innerHTML='<tr><td colspan="2">لا توجد بيانات</td></tr>'}},(e)=>{alert("خطأ اتصال: تأكد من ضغط زر Publish في Firebase")});
window.save=function(){const name=document.getElementById('n').value;const b=document.getElementById('btn');if(name){b.innerText="جاري الإرسال...";push(r,{name:name,budget:document.getElementById('b').value}).then(()=>{alert("تم بنجاح!");document.getElementById('n').value='';document.getElementById('b').value='';}).catch(e=>alert("مرفوض من Firebase: اطلب من والدتك ضغط Publish")).finally(()=>b.innerText="حفظ الآن");}else{alert("أدخل الاسم")}};</script></body></html>
