<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>منظومة المشاريع - بلدية باجة</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><style>
body{background-color:#f4f7f6;font-family:'Segoe UI',Arial;padding:10px;font-size:12px} .card{border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);border:none;margin-bottom:15px} .card-header{background:#004a99;color:white;font-weight:bold;padding:8px 15px} .form-label{font-weight:bold;color:#333;margin-bottom:2px;font-size:11px} .btn-primary{background:#004a99} .table th{background:#f8f9fa;vertical-align:middle;font-size:11px;border:1px solid #dee2e6} .table td{border:1px solid #dee2e6} .result-box{background:#e9ecef;font-weight:bold;color:#004a99}
@media print{ .no-print{display:none !important} .card{box-shadow:none;border:1px solid #ddd} body{background:white;padding:0} table{width:100% !important;border-collapse:collapse} th,td{border:1px solid #000 !important;padding:2px !important;font-size:10px} }
</style></head><body><div class="container-fluid">
<div class="text-center mb-3 no-print"><h4 style="color:#004a99">بلدية باجة - المصلحة الفنية<br><small class="text-muted">نظام متابعة المشاريع والمقاولات</small></h4></div>

<div class="card no-print"><div class="card-header">📝 إدخال وتعديل بيانات المشروع</div><div class="card-body pt-2">
<input type="hidden" id="edit-key"><div class="row g-2">
<div class="col-md-3"><label class="form-label">اسم المشروع</label><input type="text" id="n" class="form-control form-control-sm"></div>
<div class="col-md-2"><label class="form-label">المقاولة</label><input type="text" id="c" class="form-control form-control-sm"></div>
<div class="col-md-2"><label class="form-label">مكتب الدراسات</label><input type="text" id="st" class="form-control form-control-sm"></div>
<div class="col-md-1"><label class="form-label">المدة (يوم)</label><input type="number" id="dur" class="form-control form-control-sm"></div>
<div class="col-md-2"><label class="form-label">إذن بدء/استئناف</label><input type="text" id="os" class="form-control form-control-sm"></div>
<div class="col-md-2"><label class="form-label">أذون التوقف</label><input type="text" id="os_p" class="form-control form-control-sm"></div>

<div class="col-md-2"><label class="form-label">التكلفة الجملية</label><input type="number" id="tot" class="form-control form-control-sm"></div>
<div class="col-md-2"><label class="form-label">المبلغ المدفوع</label><input type="number" id="paid" class="form-control form-control-sm"></div>
<div class="col-md-2"><label class="form-label">التقدم المادي %</label><input type="number" id="prog_m" class="form-control form-control-sm"></div>

<div class="col-md-2"><label class="form-label">توقف (بلدية)</label><input type="number" id="p_mun" class="form-control form-control-sm" value="0"></div>
<div class="col-md-2"><label class="form-label">سوء أحوال جوية</label><input type="number" id="p_wea" class="form-control form-control-sm" value="0"></div>
<div class="col-md-2"><label class="form-label">توقف (مقاول)</label><input type="number" id="p_con" class="form-control form-control-sm" value="0"></div>

<div class="col-12 mt-2 text-center">
<button onclick="save()" id="btn-save" class="btn btn-primary btn-sm px-5">حفظ ومعالجة</button>
<button onclick="resetForm()" class="btn btn-light btn-sm border">إلغاء</button>
</div></div></div></div>

<div class="card"><div class="card-header d-flex justify-content-between align-items-center"><span>📊 كشف متابعة المشاريع</span>
<button onclick="window.print()" class="btn btn-sm btn-dark no-print">🖨️ طباعة التقرير</button></div>
<div class="table-responsive"><table class="table table-hover text-center align-middle mb-0">
<thead><tr>
<th rowspan="2">المشروع / المقاول / الدراسة</th><th rowspan="2">المدة / الأذون</th><th colspan="3">التكاليف (د.ت)</th><th colspan="2">التقدم %</th><th colspan="4">أيام التوقف والصافي</th><th rowspan="2" class="no-print">إجراءات</th>
</tr><tr>
<th>الجملية</th><th>المدفوع</th><th>المتبقي</th><th>مالي</th><th>مادي</th><th>بلدية</th><th>جو</th><th>مقاول</th><th>الصافي</th>
</tr></thead><tbody id="list"><tr><td colspan="12">جاري تحميل البيانات...</td></tr></tbody></table></div></div></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getDatabase,ref,onValue,push,set,remove}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
const config={databaseURL:"https://suivi-projets-4817b-default-rtdb.firebaseio.com/"};
const app=initializeApp(config);const db=getDatabase(app);const r=ref(db,'projects_final');

onValue(r,(snap)=>{
const d=snap.val();const l=document.getElementById('list');l.innerHTML='';
if(d){Object.keys(d).forEach(k=>{const p=d[k];
const rem = (Number(p.tot) - Number(p.paid)).toFixed(3);
const per_f = p.tot > 0 ? ((p.paid / p.tot) * 100).toFixed(1) : 0;
const net_days = Number(p.dur) - Number(p.p_con);

l.insertAdjacentHTML('afterbegin',`<tr>
<td class="text-end"><b>${p.name}</b><br><small>${p.c} | ${p.st}</small></td>
<td><small>${p.dur} يوم<br>OS: ${p.os}</small></td>
<td>${p.tot}</td><td>${p.paid}</td><td class="text-danger fw-bold">${rem}</td>
<td class="bg-light fw-bold">${per_f}%</td><td class="table-info">${p.prog_m}%</td>
<td>${p.p_mun}</td><td>${p.p_wea}</td><td>${p.p_con}</td><td class="result-box">${net_days}</td>
<td class="no-print">
<button onclick="edit('${k}',${JSON.stringify(p)})" class="btn btn-sm btn-outline-success p-1">تعديل</button>
<button onclick="del('${k}')" class="btn btn-sm btn-outline-danger p-1">حذف</button>
</td></tr>`)});}
else{l.innerHTML='<tr><td colspan="12">لا توجد سجلات</td></tr>'}},(e)=>alert(e.message));

window.save=function(){
const k=document.getElementById('edit-key').value; const n=document.getElementById('n').value; if(!n){alert("ادخل اسم المشروع");return;}
const pData={
name:n, c:document.getElementById('c').value, st:document.getElementById('st').value,
dur:document.getElementById('dur').value, os:document.getElementById('os').value,
os_p:document.getElementById('os_p').value, tot:document.getElementById('tot').value,
paid:document.getElementById('paid').value, prog_m:document.getElementById('prog_m').value,
p_mun:document.getElementById('p_mun').value, p_wea:document.getElementById('p_wea').value,
p_con:document.getElementById('p_con').value
};
if(k){set(ref(db,'projects_final/'+k),pData).then(()=>{alert("تم التعديل");resetForm();});}
else{push(r,pData).then(()=>{alert("تم الحفظ");resetForm();});}};

window.edit=function(k,p){
document.getElementById('edit-key').value=k; document.getElementById('n').value=p.name;
document.getElementById('c').value=p.c; document.getElementById('st').value=p.st;
document.getElementById('dur').value=p.dur; document.getElementById('os').value=p.os;
document.getElementById('os_p').value=p.os_p; document.getElementById('tot').value=p.tot;
document.getElementById('paid').value=p.paid; document.getElementById('prog_m').value=p.prog_m;
document.getElementById('p_mun').value=p.p_mun; document.getElementById('p_wea').value=p.p_wea;
document.getElementById('p_con').value=p.p_con;
document.getElementById('btn-save').innerText="تحديث البيانات الآن"; window.scrollTo(0,0);};

window.del=function(k){if(confirm("حذف المشروع نهائياً؟")){remove(ref(db,'projects_final/'+k));}};
window.resetForm=function(){ document.getElementById('edit-key').value=''; document.getElementById('btn-save').innerText="حفظ ومعالجة"; document.querySelectorAll('input').forEach(i=>i.value='')};
</script></body></html>
